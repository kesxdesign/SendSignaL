<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ============================================
         PRIMARY META
    ============================================ -->
    <title>SendSignaL WhatsApp Campaign</title>
    <meta name="description" content="Send personalized WhatsApp campaign messages" />
    <meta name="keywords" content="WhatsApp automation, lead outreach, WhatsApp marketing, personalized messaging, campaign automation, WhatsApp Business API, SaaS messaging tool, lead engagement, bulk WhatsApp sender" />
    <meta name="author" content="SendSignaL" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://sendsignal.app/" />

    <!-- ============================================
         OPEN GRAPH (Facebook, LinkedIn, WhatsApp Preview)
    ============================================ -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SendSignaL" />
    <meta property="og:url" content="https://sendsignal.app/" />
    <meta property="og:title" content="SendSignaL – Automate Personalized WhatsApp Outreach" />
    <meta property="og:description" content="Capture leads from social platforms and send personalized WhatsApp messages automatically. Run campaigns, track delivery, and stay compliant — all in one place." />
    <meta property="og:image" content="https://sendsignal.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="SendSignaL dashboard showing WhatsApp campaign metrics" />
    <meta property="og:locale" content="en_US" />

    <!-- ============================================
         TWITTER / X CARD
    ============================================ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@sendsignal" />
    <meta name="twitter:creator" content="@sendsignal" />
    <meta name="twitter:title" content="SendSignaL – Automate Personalized WhatsApp Outreach" />
    <meta name="twitter:description" content="Stop chasing leads manually. SendSignaL automates personalized WhatsApp campaigns from your social media leads — at scale." />
    <meta name="twitter:image" content="https://sendsignal.app/og-image.png" />
    <meta name="twitter:image:alt" content="SendSignaL – WhatsApp Campaign Automation Platform" />

    <!-- ============================================
         STRUCTURED DATA – SoftwareApplication (JSON-LD)
    ============================================ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "SendSignaL",
      "url": "https://sendsignal.app",
      "description": "SendSignaL is a SaaS platform that automates personalized WhatsApp messaging for leads captured from social platforms.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Personalized WhatsApp campaigns",
        "Lead management from social platforms",
        "Automated message delivery",
        "Campaign analytics and tracking",
        "WhatsApp Business API integration",
        "Opt-out compliance management"
      ],
      "screenshot": "https://sendsignal.app/og-image.png"
    }
    </script>

    <!-- ============================================
         THEME & ICONS
    ============================================ -->
    <meta name="theme-color" content="#0f0f1a" />
    <meta name="msapplication-TileColor" content="#0f0f1a" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- ============================================
         PERFORMANCE
    ============================================ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
