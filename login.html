<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to SendSignal — your automated WhatsApp outreach platform.">
  <title>Sign In — SendSignal</title>
  <link rel="stylesheet" href="variables.css">
  <link rel="stylesheet" href="login.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="login-page">

    <!-- Left panel — branding + illustration -->
    <aside class="login-hero">
      <div class="hero-content">
        <div class="hero-logo">
          <span class="logo-icon">&#9889;</span>
          <span class="logo-text">SendSignal</span>
        </div>
        <h1 class="hero-heading">Reach your audience<br>at the speed of a message.</h1>
        <p class="hero-subtext">Automate WhatsApp outreach, manage leads, and launch campaigns — all in one place.</p>

        <!-- Decorative floating shapes -->
        <div class="hero-shapes">
          <div class="shape shape-1"></div>
          <div class="shape shape-2"></div>
          <div class="shape shape-3"></div>
          <div class="shape shape-4"></div>
        </div>
      </div>
    </aside>

    <!-- Right panel — login form -->
    <main class="login-main">
      <div class="login-card">

        <header class="card-header">
          <h2 class="card-title">Welcome back</h2>
          <p class="card-subtitle">Sign in to continue to your dashboard</p>
        </header>

        <form class="login-form" action="#" method="post" id="login-form">

          <!-- Email -->
          <div class="form-group">
            <label for="email" class="form-label">Email address</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="3"/>
                <path d="M22 7l-10 6L2 7"/>
              </svg>
              <input
                type="email"
                id="email"
                name="email"
                class="form-input"
                placeholder="you@company.com"
                required
                autocomplete="email"
              >
            </div>
          </div>

          <!-- Password -->
          <div class="form-group">
            <div class="label-row">
              <label for="password" class="form-label">Password</label>
              <a href="#" class="forgot-link" id="forgot-password-link">Forgot password?</a>
            </div>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
                <circle cx="12" cy="16" r="1"/>
              </svg>
              <input
                type="password"
                id="password"
                name="password"
                class="form-input"
                placeholder="Enter your password"
                required
                autocomplete="current-password"
              >
            </div>
          </div>

          <!-- Remember me -->
          <div class="form-options">
            <label class="checkbox-label" for="remember">
              <input type="checkbox" id="remember" name="remember" class="checkbox-input">
              <span class="checkbox-custom"></span>
              <span class="checkbox-text">Remember me</span>
            </label>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn-primary" id="login-button">
            Sign in
          </button>
        </form>

        <!-- Divider -->
        <div class="divider">
          <span class="divider-text">or</span>
        </div>

        <!-- Social login stubs (no JS, purely visual) -->
        <button type="button" class="btn-social" id="google-login-button">
          <svg class="social-icon" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continue with Google
        </button>

        <!-- Sign-up link -->
        <p class="signup-text">
          Don't have an account? <a href="#" class="signup-link" id="signup-link">Create one</a>
        </p>

      </div>
    </main>
  </div>

</body>
</html>
